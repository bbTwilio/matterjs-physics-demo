<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Matter.js Physics Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="permission-container" style="display: none;">
    <button id="permission-btn">Enable Accelerometer</button>
  </div>

  <div id="controls-container">
    <label for="sensitivity-slider">Motion Sensitivity:</label>
    <input type="range" id="sensitivity-slider" min="0" max="100" value="50" step="0.1">
    <span id="sensitivity-value">5000%</span>
  </div>

  <div id="canvas-container"></div>

  <!-- Matter.js from CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
